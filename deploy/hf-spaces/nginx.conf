worker_processes auto;
pid /run/nginx.pid;
error_log /var/log/nginx/error.log warn;

events {
    worker_connections 256;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    access_log /var/log/nginx/access.log;

    sendfile    on;
    tcp_nopush  on;
    keepalive_timeout 65;

    # Allow large file uploads (images)
    client_max_body_size 100M;

    upstream upload_service {
        server 127.0.0.1:8001;
    }

    upstream classify_service {
        server 127.0.0.1:8002;
    }

    upstream results_service {
        server 127.0.0.1:8003;
    }

    server {
        listen 7860;

        location /api/upload/ {
            proxy_pass http://upload_service/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 180s;
        }

        location /api/classify/ {
            proxy_pass http://classify_service/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 180s;
        }

        location /api/results/ {
            proxy_pass http://results_service/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 60s;
        }

        location /health {
            return 200 '{"status":"ok"}';
            add_header Content-Type application/json;
        }

        location / {
            return 404 '{"detail":"Use /api/upload/, /api/classify/, or /api/results/"}';
            add_header Content-Type application/json;
        }
    }
}
